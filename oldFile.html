<script>
  let roleInterval;
  let timeout;

  const name = document.getElementById('name');
  const role = document.getElementById('role');
  const description = document.getElementById('description');

  const previewRole = document.getElementById('rolePreview');
  const previewDescription = document.getElementById('descriptionPreview');
  const previewName = document.getElementById('namePreview');

  //Icons keys
  const frontendKeys = ['html', 'css', 'js', 'ts', 'sass', 'less', 'react', 'vue', 'angular', 'svelte', 'nextjs', 'nuxtjs', 'astro', 'tailwind', 'bootstrap', 'threejs'];
  const backendKeys = ['nodejs', 'express', 'django', 'flask', 'fastapi', 'laravel', 'rails', 'spring', 'php', 'py', 'go', 'rust', 'java', 'cs', 'kotlin'];
  const gameKeys = ['cpp', 'c', 'lua', 'godot', 'unity', 'unreal'];
  const databaseKeys = ['mongodb', 'mysql', 'postgres', 'sqlite', 'redis', 'cassandra', 'dynamodb', 'firebase'];
  const toolsKeys = ['docker', 'kubernetes', 'nginx', 'graphql', 'git', 'postman', 'prisma', 'sequelize'];

  //Loghi
  const categories = [
    { label: 'Front-end',     langs: frontend,  keys: frontendKeys  },
    { label: 'Backend',       langs: backend,   keys: backendKeys   },
    { label: 'Game/Scripting',langs: game,      keys: gameKeys      },
    { label: 'Database',      langs: database,  keys: databaseKeys  },
    { label: 'Tools',         langs: tools,     keys: toolsKeys     },  
  ];

  const previewLangs = document.getElementById('previewLangs');

  function updatePreview() {
    previewLangs.innerHTML = '';
    categories.forEach(({label, langs, keys}) => {
    const selected = langs.reduce((acc, lang, i) => {
      const id = lang.toLowerCase().replace('.', '');
      if (document.getElementById(id)?.checked) {
        acc.push({ label: lang, key: keys[i] });
      }
      return acc;
    }, []);

      if (selected.length === 0) return;

      const section = document.createElement('div');
      section.innerHTML = `
        <div class="border-b border-green-500/30 w-[50rem]"></div>
        <h2 class="font-semibold text-xl text-white mt-6 mb-3">${label}</h2>
        <div class="flex flex-wrap gap-2">
          ${selected.map(l => `
            <img src="https://skillicons.dev/icons?i=${l.key}" class="w-8 h-8" title="${l.label}" />
          `).join('')}
        </div>
      `;
      previewLangs.appendChild(section);
    });
  }

  //Animation writing

  function typeWriterSequence(element, phrases, speed = 100) {
    clearInterval(roleInterval);
    element.textContent = '';
    let phraseIndex = 0;
    let charIndex = 0;
    let deleting = false;
    let waiting = false;

    roleInterval = setInterval(() => {
      if (waiting) return;

      const current = phrases[phraseIndex];

      if (!deleting) {
        if (charIndex >= current.length) {

          waiting = true;

          // Se è l'ultima frase aspetta 3 secondi
          const delay = (phraseIndex === phrases.length - 1)
            ? 3000
            : 1000;

          setTimeout(() => {
            deleting = true;
            waiting = false;
          }, delay);

          return;
        }

        element.textContent += current[charIndex];
        charIndex++;

      } else {
        element.textContent = element.textContent.slice(0, -1);

        if (element.textContent.length === 0) {
          deleting = false;
          charIndex = 0;
          phraseIndex++;

          if (phraseIndex >= phrases.length) {
            phraseIndex = 0;
          }
        }
      }
    }, speed);
  }

  name.addEventListener('input', () => {
    clearTimeout(timeout);
    timeout = setTimeout(() => {
      typeWriterSequence(previewName, [
        `Hi there!`,
        `I'm ${name.value}!`
      ]);
    }, 500);
  })

  //Change value Role in the preview
  role.addEventListener('input', () => {
    previewRole.textContent = role.value;
  })

  //Change value Description in the preview
  description.addEventListener('input', () => {
    previewDescription.textContent = description.value;
  })

  //Change value Description in the preview
  document.querySelectorAll('input[type="checkbox"]').forEach(b => {
    b.addEventListener('change', updatePreview)
  })
</script>

<script>

  //Function for copy code
  function copyCode() {
    const text = document.getElementById('code').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const label = document.getElementById('copyLabel');
      label.textContent = 'Copied!';
      setTimeout(() => label.textContent = 'Copy', 2000);
    });
  }

  //Function for download code
  function downloadCode() {
    const text = document.getElementById('code').textContent;
    const blob = new Blob([text], { type: 'text/markdown' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'README.md';
    a.click();
    URL.revokeObjectURL(url);
  }

  //Function for generate code readme
  function generateCode() {
    const nameVal = name.value.trim();
    const roleVal = role.value.trim();
    const descVal = description.value.trim();

    const selectedByCategory = categories.map(({ label, langs, keys }) => {
      const selected = langs.reduce((acc, lang, i) => {
        const id = lang.toLowerCase().replace('.', '');
        if (document.getElementById(id)?.checked) {
          acc.push({ label: lang, key: keys[i] });
        }
        return acc;
      }, []);
      return { label, selected };
    }).filter(c => c.selected.length > 0);

    let md = '';

    if (nameVal) {
      const lines = `Hi+There!+👋;+I'm+${nameVal.replace(/ /g, '+')}!;`;
      md += `<h1 align="center">\n`;
      md += `    <img src="https://readme-typing-svg.herokuapp.com/?font=Righteous&size=35&center=true&vCenter=true&width=500&height=70&duration=4000&lines=${lines}" />\n`;
      md += `</h1>\n`;
    }

    if (roleVal) {
      md += `<h3 align="center">${roleVal}</h3>\n`;
    }

    md += `<br/>\n<hr/>\n\n`;

    if (descVal) {
      md += `<p align="center">${descVal}</p>\n\n`;
      md += `<hr/>\n\n`;
    }

    if (selectedByCategory.length > 0) {
      md += `<h2 align="center">⚒️ Languages - Frameworks - Tools ⚒️</h2>\n`;
      md += `<br/>\n<br/>\n<hr/>\n\n`;

      selectedByCategory.forEach(({ label, selected }) => {
        const iconsParam = selected.map(l => l.key).join(',');
        md += `### ${label}\n`;
        md += `<img src="https://skillicons.dev/icons?i=${iconsParam}" />\n\n`;
      });
    }

    const finalText = md || '// Il codice apparirà qui...';
    document.getElementById('code').textContent = finalText;

    // Numeri di riga
    const lineCount = finalText.split('\n').length;
    document.getElementById('lineNumbers').innerHTML = Array.from(
      { length: lineCount }, (_, i) => i + 1
    ).join('<br>');
  }

  name.addEventListener('input', generateCode);
  role.addEventListener('input', generateCode);
  description.addEventListener('input', generateCode);
  document.querySelectorAll('input[type="checkbox"]').forEach(b => {
    b.addEventListener('change', generateCode);
  });

  generateCode();
</script>

<!-- Scroll Animation -->
<script>
  document.querySelectorAll('a[href^="#"]').forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      const target = document.querySelector(link.getAttribute('href'));
      if(target) {
        lenis.scrollTo(target, { duration: 2 });
      }
    });
  });
</script>
