<style>
  .glow {
    text-shadow: 0 0 40px rgba(134,239,172,0.5);
    transition: text-shadow 0.8s ease;
  }

  body {
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  ::selection {

    color: white;
  }

  /* ── Scroll animation classes ── */
  .fade-up {
    opacity: 0;
    transform: translateY(50px);
    transition-property: opacity, transform;
    transition-duration: 0.8s;
    transition-timing-function: cubic-bezier(0.16, 1, 0.3, 1); 
  }

  .fade-up.visible {
    opacity: 1;
    transform: translateY(0);
  }
 
  .fade-left {
    opacity: 0;
    transform: translateX(60px);
    transition-property: opacity, transform;
    transition-duration: 0.8s; 
    transition-timing-function: cubic-bezier(0.16, 1, 0.3, 1); 
  }
  .fade-left.visible {
    opacity: 1;
    transform: translateX(0);
  }

  .fade-up, .fade-left {
    transition-delay: 0s;
  }

  /* ── Duration ── */
  .anim-300  { transition-duration: 300ms; }
  .anim-500  { transition-duration: 500ms; }
  .anim-700  { transition-duration: 700ms; }
  .anim-1000 { transition-duration: 1000ms; }
  .anim-1400 { transition-duration: 1400ms; }
  .anim-2000 { transition-duration: 2000ms; }
  .anim-3000 { transition-duration: 3000ms; }
  .anim-4000 { transition-duration: 4000ms; }
  .anim-5000 { transition-duration: 5000ms; }

  /* ── Easing ── */
  .ease-spring  { transition-timing-function: cubic-bezier(0.16, 1, 0.3, 1); }
  .ease-smooth  { transition-timing-function: cubic-bezier(0.25, 1, 0.5, 1); }
  .ease-bounce  { transition-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1); }
  .ease-out     { transition-timing-function: ease-out; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      scroll-behavior: auto !important;
      transition-duration: 0.01ms !important;
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
    }
  }
</style>

<script>
  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const lenis = prefersReducedMotion ? null : new Lenis({
    duration: 2,
    smoothWheel: true,
  });

  function raf(time) {
    lenis.raf(time);
    requestAnimationFrame(raf);
  }

  if (lenis) {
    requestAnimationFrame(raf);
  }
</script>

<!-- Preview/Animation writing -->
<script>
  let roleInterval;
  let timeout;

  const name = document.getElementById('name');
  const role = document.getElementById('role');
  const description = document.getElementById('description');

  const previewRole = document.getElementById('rolePreview');
  const previewDescription = document.getElementById('descriptionPreview');
  const previewName = document.getElementById('namePreview');

  //Icons keys
  const frontendKeys = ['html', 'css', 'js', 'ts', 'sass', 'less', 'react', 'vue', 'angular', 'svelte', 'nextjs', 'nuxtjs', 'astro', 'tailwind', 'bootstrap', 'threejs'];
  const backendKeys = ['nodejs', 'express', 'django', 'flask', 'fastapi', 'laravel', 'rails', 'spring', 'php', 'py', 'go', 'rust', 'java', 'cs', 'kotlin'];
  const gameKeys = ['cpp', 'c', 'lua', 'godot', 'unity', 'unreal'];
  const databaseKeys = ['mongodb', 'mysql', 'postgres', 'sqlite', 'redis', 'cassandra', 'dynamodb', 'firebase'];
  const toolsKeys = ['docker', 'kubernetes', 'nginx', 'graphql', 'git', 'postman', 'prisma', 'sequelize'];

  //Logos
  const categories = [
    { label: 'Front-end',     langs: frontend,  keys: frontendKeys  },
    { label: 'Backend',       langs: backend,   keys: backendKeys   },
    { label: 'Game/Scripting',langs: game,      keys: gameKeys      },
    { label: 'Database',      langs: database,  keys: databaseKeys  },
    { label: 'Tools',         langs: tools,     keys: toolsKeys     },  
  ];

  const previewLangs = document.getElementById('previewLangs');

  //Update Preview Buttons
  function updatePreview() {
    previewLangs.innerHTML = '';
    categories.forEach(({label, langs, keys}) => {
    const selected = langs.reduce((acc, lang, i) => {
      const id = lang.toLowerCase().replace('.', '');
      if (document.getElementById(id)?.checked) {
        acc.push({ label: lang, key: keys[i] });
      }
      return acc;
    }, []);

      if (selected.length === 0) return;

      const section = document.createElement('div');
      section.innerHTML = `
        <div class="border-b border-green-500/30 w-full"></div>
        <h2 class="font-semibold text-xl text-white mt-6 mb-3">${label}</h2>
        <div class="flex flex-wrap gap-2">
          ${selected.map(l => `
            <img src="https://skillicons.dev/icons?i=${l.key}" class="w-8 h-8" title="${l.label}" />
          `).join('')}
        </div>
      `;
      previewLangs.appendChild(section);
    });
  }

  const socialCategories = [
    { logo: 'instagram', label: 'Instagram', color: 'd12802', colorLogo: ''  },
    { logo: 'linkedin',  label: 'Linkedin',  color: '0077B5', colorLogo: ''  },
    { logo: 'gmail',     label: 'Gmail',     color: 'EA4335', colorLogo: 'white'  },
    { logo: 'tiktok',    label: 'TikTok',    color: '000000', colorLogo: ''  },
    { logo: 'youtube',   label: 'Youtube',   color: 'FF0000', colorLogo: ''  },
    { logo: 'twitch',    label: 'Twitch',    color: '9146FF', colorLogo: 'white'  },
    { logo: 'reddit',    label: 'Reddit',    color: 'FF4500', colorLogo: 'white' },
    { logo: 'discord',   label: 'Discord',   color: '5865F2', colorLogo: 'white' },
    { logo: 'x',         label: 'X',         color: '000000', colorLogo: ''  },
  ];

  //Update Preview Social
  function updatePreview2() {
    const previewSocialEl = document.getElementById('previewSocial');
    previewSocialEl.innerHTML = '';

    const filled = socialCategories.filter(s => {
      const id = s.label.toLowerCase().replace('.', '');
      return document.getElementById(id)?.value.trim();
    })

    if(filled.length === 0) return;

    const section = document.createElement('div');
    section.id = 'socialPreviewSection';
    section.innerHTML = `
      <div class="border-b border-green-500/30 w-full"></div>
      <h2 class="font-semibold text-xl text-white mt-6 mb-3">Social</h2>
      <div class="flex flex-wrap gap-2">
        ${filled.map(s => {
          const id = s.label.toLowerCase().replace('.', '');
          const url = document.getElementById(id).value.trim();
          return `
          <a href="${url}" target="_blank" rel="noopener noreferrer">
            <img src="https://img.shields.io/badge/${s.label}-${s.color}?logo=${s.logo}&logoColor=${s.colorLogo}" alt="${s.label}">
          </a>`;
        }).join('')}
      </div>
    `;

    previewSocialEl.appendChild(section)
  }

  //Animation writing

  function typeWriterSequence(element, phrases, speed = 100) {
    clearInterval(roleInterval);
    element.textContent = '';
    let phraseIndex = 0;
    let charIndex = 0;
    let deleting = false;
    let waiting = false;

    roleInterval = setInterval(() => {
      if (waiting) return;

      const current = phrases[phraseIndex];

      if (!deleting) {
        if (charIndex >= current.length) {

          waiting = true;

          const delay = (phraseIndex === phrases.length - 1)
            ? 3000
            : 1000;

          setTimeout(() => {
            deleting = true;
            waiting = false;
          }, delay);

          return;
        }

        element.textContent += current[charIndex];
        charIndex++;

      } else {
        element.textContent = element.textContent.slice(0, -1);

        if (element.textContent.length === 0) {
          deleting = false;
          charIndex = 0;
          phraseIndex++;

          if (phraseIndex >= phrases.length) {
            phraseIndex = 0;
          }
        }
      }
    }, speed);
  }

  name.addEventListener('input', () => {
    clearTimeout(timeout);
    timeout = setTimeout(() => {
      typeWriterSequence(previewName, [
        `Hi there!`,
        `I'm ${name.value}!`
      ]);
    }, 500);
  })

  //Change value Role in the preview
  role.addEventListener('input', () => {
    previewRole.textContent = role.value;
  })

  //Change value Description in the preview
  description.addEventListener('input', () => {
    previewDescription.textContent = description.value;
  })

  //Change value Description in the preview
  document.querySelectorAll('input[type="checkbox"]').forEach(b => {
    b.addEventListener('change', updatePreview)
  })

  //Change value Social in the preview
  document.querySelectorAll('#social-grid input[type="text"]').forEach(b => {
    b.addEventListener('input', updatePreview2)
  })

</script>

<!-- Code Generator for GitHub readme -->
<script>

  //Function for copy code
  function copyCode() {
    const text = document.getElementById('code').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const label = document.getElementById('copyLabel');
      label.textContent = 'Copied!';
      setTimeout(() => label.textContent = 'Copy', 2000);
    });
  }

  //Function for download code
  function downloadCode() {
    const text = document.getElementById('code').textContent;
    const blob = new Blob([text], { type: 'text/markdown' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'README.md';
    a.click();
    URL.revokeObjectURL(url);
  }

  //Function for generate code readme
  function generateCode() {
    const nameVal = name.value.trim();
    const roleVal = role.value.trim();
    const descVal = description.value.trim();

    const selectedByCategory = categories.map(({ label, langs, keys }) => {
      const selected = langs.reduce((acc, lang, i) => {
        const id = lang.toLowerCase().replace('.', '');
        if (document.getElementById(id)?.checked) {
          acc.push({ label: lang, key: keys[i] });
        }
        return acc;
      }, []);
      return { label, selected };
    }).filter(c => c.selected.length > 0);

    const selectedSocial = socialCategories.filter(s => {
      const id = s.label.toLowerCase().replace('.', '');
      return document.getElementById(id)?.value.trim();
    }) 

    let md = '';

    if (nameVal) {
      const lines = `Hi+There!+👋;+I'm+${nameVal.replace(/ /g, '+')}!;`;
      md += `<h1 align="center">\n`;
      md += `    <img src="https://readme-typing-svg.herokuapp.com/?font=Righteous&size=35&center=true&vCenter=true&width=500&height=70&duration=4000&lines=${lines}" />\n`;
      md += `</h1>\n`;
    }

    if (roleVal) {
      md += `<h3 align="center">${roleVal}</h3>\n`;
    }

    md += `<br/>\n<hr/>\n\n`;

    if (descVal) {
      md += `<p align="center">${descVal}</p>\n\n`;
      md += `<hr/>\n\n`;
    }

    if (selectedByCategory.length > 0) {
      md += `<h2 align="center">Languages - Frameworks - Tools</h2>\n`;
      md += `<br/>\n<br/>\n<hr/>\n\n`;

      selectedByCategory.forEach(({ label, selected }) => {
        const iconsParam = selected.map(l => l.key).join(',');
        md += `### ${label}\n`;
        md += `<img src="https://skillicons.dev/icons?i=${iconsParam}" />\n\n`;
      });
    }

    if(selectedSocial.length > 0) {
      md += `<hr/>\n\n`;
      md += `<h2 align="center">Social</h2>\n`;
      md += `<br/>\n<br/>\n<hr/>\n\n`;

      selectedSocial.forEach(s => {
        const id = s.label.toLowerCase().replace('.', '');
        const url = document.getElementById(id)?.value.trim();
        md += `  <a href="${url}"><img src="https://img.shields.io/badge/${s.label}-${s.color}?logo=${s.logo}&logoColor=${s.colorLogo}" alt="${s.label}"></a>\n`;
      });
    }

    const finalText = md;
    document.getElementById('code').textContent = finalText;

    const lineCount = finalText.split('\n').length;
    document.getElementById('lineNumbers').innerHTML = Array.from(
      { length: lineCount }, (_, i) => i + 1
    ).join('<br>');
  }

  name.addEventListener('input', generateCode);
  role.addEventListener('input', generateCode);
  description.addEventListener('input', generateCode);
  document.querySelectorAll('input[type="checkbox"]').forEach(b => {
    b.addEventListener('change', generateCode);
  });
  document.querySelectorAll('#social-grid input[type="text"]').forEach(b => {
    b.addEventListener('input', generateCode);
  })

  generateCode();
</script>

<!-- Scroll Animation -->
<script>
  document.querySelectorAll('a[href^="#"]').forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      const target = document.querySelector(link.getAttribute('href'));
      if(target) {
        if (lenis) {
          lenis.scrollTo(target, { duration: 2 });
        } else {
          target.scrollIntoView({ behavior: 'auto' });
        }
      }
    });
  });
</script>

<!-- Animation Website -->
<script>
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      } else {
        entry.target.classList.remove('visible');
      }
    });
  }, { threshold: 0.12 });

  document.querySelectorAll('.fade-up, .fade-left').forEach(el => {
    const rect = el.getBoundingClientRect();
    if (rect.top < window.innerHeight) {
      el.classList.add('visible');
    }
    observer.observe(el);
  });
</script>

</html>
